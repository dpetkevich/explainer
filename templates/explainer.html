<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<style>
  :root {
    --bg: #fdfdfb;
    --fg: #1a1a1a;
    --muted: #555;
    --rule: #e2e2dc;
    --accent: #2f6fed;
    color-scheme: light dark;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181c;
      --fg: #e8e8e4;
      --muted: #a0a0a0;
      --rule: #33363c;
      --accent: #7aa6ff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 1.25rem 4rem;
  }
  h1 {
    font-size: 2rem;
    line-height: 1.25;
    margin: 0 0 1rem;
    letter-spacing: -0.01em;
  }
  .hook {
    font-size: 1.125rem;
    color: var(--muted);
    margin: 0 0 3rem;
  }
  .page-links {
    margin: -2.25rem 0 3rem;
    font-size: 0.9rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.1rem 0.5rem;
  }
  .page-links a { color: var(--accent); text-decoration: none; }
  .page-links a:hover { text-decoration: underline; }
  .page-links .sep { color: var(--muted); }
  .page-links .pedagogy {
    color: var(--muted);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 0.05rem 0.6rem;
    font-size: 0.82rem;
  }
  section.endorsements {
    margin: -1.5rem 0 3rem;
    padding: 1rem 1.25rem;
    border: 1px solid var(--rule);
    border-radius: 8px;
  }
  section.endorsements h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 0.5rem;
  }
  section.endorsements ul { list-style: none; margin: 0; padding: 0; }
  section.endorsements li { margin: 0.35rem 0; }
  section.endorsements .check { color: #2e9e5b; font-weight: 700; margin-right: 0.35rem; }
  section.endorsements .date { color: var(--muted); font-size: 0.85em; }
  section.endorsements blockquote {
    margin: 0.25rem 0 0 1.4rem;
    color: var(--muted);
    font-style: italic;
  }
  header.part {
    margin: 4rem 0 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
  }
  header.part h2 {
    font-size: 1.6rem;
    margin: 0 0 0.5rem;
    letter-spacing: -0.01em;
  }
  header.part .part-lede {
    color: var(--muted);
    font-size: 1.05rem;
    margin: 0;
  }
  section.scene { margin: 0 0 3.5rem; }
  section.scene h3 {
    font-size: 1.35rem;
    margin: 0 0 0.5rem;
    letter-spacing: -0.01em;
  }
  section.scene .caption {
    color: var(--muted);
    margin: 0 0 1.25rem;
  }
  .caption math, .hook math { font-size: 1.2em; }
  .caption ul, .part-lede ul { margin: 0.45rem 0 0; padding-left: 1.25rem; }
  .caption li, .part-lede li { margin: 0.2rem 0; }
  iframe.scene-frame {
    display: block;
    width: 100%;
    height: 480px; /* replaced by postMessage-reported height */
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: transparent;
    overflow: hidden;
  }
  footer {
    margin-top: 4rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--rule);
    color: var(--muted);
    font-size: 0.875rem;
  }
</style>
</head>
<body>
<main>
  <h1>{{title}}</h1>
  <p class="hook">{{hook}}</p>
{{links}}
{{endorsements}}

{{scenes}}

  <footer>{{footer}}</footer>
</main>
<script>
  // Size each scene iframe to its content so it never shows its own scrollbar
  // (a "scrollbar inside the page scrollbar"). Two mechanisms, belt-and-suspenders:
  //
  // 1) Scenes postMessage({ explainItScene, height }) — but their ResizeObserver only
  //    fires on box-size changes, so late reflow (MathML, web fonts, async SVG) that
  //    grows content AFTER the first report is missed and the frame stays too short.
  // 2) Because scenes are srcdoc (same-origin), we also measure each frame's true
  //    scrollHeight directly and refit on every signal that can change it: the load
  //    event, DOM mutations, box resizes, fonts.ready, and a few bounded timeouts that
  //    catch reflow with no observable trigger. This converges and needs no scene changes.
  const fitToContent = (frame) => {
    let doc;
    try { doc = frame.contentDocument; } catch { return; }
    if (!doc) return;
    const h = Math.max(
      doc.documentElement ? doc.documentElement.scrollHeight : 0,
      doc.body ? doc.body.scrollHeight : 0
    );
    if (h && Math.ceil(h) !== Math.ceil(parseFloat(frame.style.height) || 0)) {
      frame.style.height = Math.ceil(h) + "px";
    }
  };

  const wireFrame = (frame) => {
    let doc;
    try { doc = frame.contentDocument; } catch { return; }
    if (!doc || !doc.documentElement) return;
    const refit = () => fitToContent(frame);
    refit();
    try { new MutationObserver(refit).observe(doc.documentElement, { subtree: true, childList: true, attributes: true, characterData: true }); } catch { /* noop */ }
    try { new ResizeObserver(refit).observe(doc.documentElement); } catch { /* noop */ }
    try { if (doc.fonts && doc.fonts.ready) doc.fonts.ready.then(refit); } catch { /* noop */ }
    [50, 150, 350, 700, 1200, 2500].forEach((t) => setTimeout(refit, t));
  };

  for (const frame of document.querySelectorAll("iframe.scene-frame")) {
    frame.addEventListener("load", () => wireFrame(frame));
    // Non-lazy or already-cached frames may have loaded before this ran.
    try { if (frame.contentDocument && frame.contentDocument.readyState === "complete") wireFrame(frame); } catch { /* noop */ }
  }

  // Keep honoring scene-sent heights too (harmless, and covers any edge our measure misses).
  addEventListener("message", (event) => {
    const data = event.data;
    if (!data || typeof data !== "object" || !data.explainItScene || typeof data.height !== "number") return;
    for (const frame of document.querySelectorAll("iframe.scene-frame")) {
      if (frame.contentWindow === event.source) {
        if (Math.ceil(data.height) > Math.ceil(parseFloat(frame.style.height) || 0)) {
          frame.style.height = Math.ceil(data.height) + "px";
        }
        break;
      }
    }
  });
</script>
</body>
</html>
