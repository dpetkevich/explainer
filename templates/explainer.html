<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<style>
  :root {
    --bg: #fdfdfb;
    --fg: #1a1a1a;
    --muted: #555;
    --rule: #e2e2dc;
    color-scheme: light dark;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181c;
      --fg: #e8e8e4;
      --muted: #a0a0a0;
      --rule: #33363c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 1.25rem 4rem;
  }
  h1 {
    font-size: 2rem;
    line-height: 1.25;
    margin: 0 0 1rem;
    letter-spacing: -0.01em;
  }
  .hook {
    font-size: 1.125rem;
    color: var(--muted);
    margin: 0 0 3rem;
  }
  header.part {
    margin: 4rem 0 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
  }
  header.part h2 {
    font-size: 1.6rem;
    margin: 0 0 0.5rem;
    letter-spacing: -0.01em;
  }
  header.part .part-lede {
    color: var(--muted);
    font-size: 1.05rem;
    margin: 0;
  }
  section.scene { margin: 0 0 3.5rem; }
  section.scene h3 {
    font-size: 1.35rem;
    margin: 0 0 0.5rem;
    letter-spacing: -0.01em;
  }
  section.scene .caption {
    color: var(--muted);
    margin: 0 0 1.25rem;
  }
  .caption math, .hook math { font-size: 1.2em; }
  iframe.scene-frame {
    display: block;
    width: 100%;
    height: 480px; /* replaced by postMessage-reported height */
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: transparent;
    overflow: hidden;
  }
  footer {
    margin-top: 4rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--rule);
    color: var(--muted);
    font-size: 0.875rem;
  }
</style>
</head>
<body>
<main>
  <h1>{{title}}</h1>
  <p class="hook">{{hook}}</p>

{{scenes}}

  <footer>{{footer}}</footer>
</main>
<script>
  // Scenes report their height via postMessage({ explainItScene, height }).
  addEventListener("message", (event) => {
    const data = event.data;
    if (!data || typeof data !== "object" || !data.explainItScene || typeof data.height !== "number") return;
    for (const frame of document.querySelectorAll("iframe.scene-frame")) {
      if (frame.contentWindow === event.source) {
        frame.style.height = Math.ceil(data.height) + "px";
        break;
      }
    }
  });
</script>
</body>
</html>
